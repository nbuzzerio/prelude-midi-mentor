<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Prelude piano icon</title>
  <desc id="desc">A simple piano keyboard on a dark rounded-square background.</desc>

  <rect width="512" height="512" rx="104" fill="#111827"/>

  <g transform="translate(76 122)">
    <!-- White keys -->
    <rect x="0" y="0" width="90" height="268" rx="18" fill="#ffffff"/>
    <rect x="90" y="0" width="90" height="268" rx="18" fill="#ffffff"/>
    <rect x="180" y="0" width="90" height="268" rx="18" fill="#ffffff"/>
    <rect x="270" y="0" width="90" height="268" rx="18" fill="#ffffff"/>

    <!-- Key separators -->
    <path d="M90 0V268M180 0V268M270 0V268"
          stroke="#111827"
          stroke-width="10"
          stroke-linecap="round"/>

    <!-- Black keys -->
    <rect x="64" y="0" width="52" height="158" rx="10" fill="#111827"/>
    <rect x="154" y="0" width="52" height="158" rx="10" fill="#111827"/>
    <rect x="244" y="0" width="52" height="158" rx="10" fill="#111827"/>
  </g>
</svg>
